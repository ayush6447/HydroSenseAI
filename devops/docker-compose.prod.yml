version: '3.8'
services:
  backend:
    image: your-ecr-repo/hydroponic-backend:latest
    ports: ["8000:8000"]
    env_file: .env.prod
  frontend:
    image: your-ecr-repo/hydroponic-frontend:latest
    ports: ["80:80"]
  nginx:
    image: nginx:alpine
    volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf]
    ports: ["443:443"]
    depends_on: [backend, frontend]
